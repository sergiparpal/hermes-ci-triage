[pytest]
# Config lives in tests/ (not the plugin root) on purpose: the plugin root has
# an __init__.py, and if it were the pytest rootdir, pytest would build a
# Package node for it and import that __init__.py — which uses relative imports
# only valid when Hermes loads it as hermes_plugins.hermes_ci_triage. Keeping
# rootdir at tests/ (no __init__.py here) avoids that. conftest.py installs the
# plugin package the way Hermes does.
addopts = --import-mode=importlib
